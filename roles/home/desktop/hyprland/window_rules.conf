windowrulev2 = suppressevent maximize, class:.*

windowrulev2 = size 75% 75%, floating:1
windowrulev2 = center, floating:1

# Discord - Special workspace, floating
windowrulev2 = workspace special:discord, class:(discord)
windowrulev2 = float, class:(discord)
windowrulev2 = stayfocused, class:(discord)

# Pavucontrol - Floating
windowrulev2 = float, class:(org.pulseaudio.pavucontrol)
windowrulev2 = stayfocused, class:(org.pulseaudio.pavucontrol)
